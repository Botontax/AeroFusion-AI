<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AeroFusion AI Login</title>

    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Segoe UI", sans-serif;
            margin: 0;
        }

        .login-box {
            background: #2c3e50;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            width: 340px;
            text-align: center;
        }

        h2 {
            margin-bottom: 8px;
            color: #ecf0f1;
        }

        .subtitle {
            color: #95a5a6;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .login-error {
            color: #ffb3b3;
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid rgba(255, 0, 0, 0.35);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            box-sizing: border-box;
            background: #34495e;
            color: white;
            font-size: 14px;
        }

        input::placeholder {
            color: #bdc3c7;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #e67e22;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #d35400;
        }

        .hint {
            font-size: 12px;
            color: #95a5a6;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="login-box">

        <h2>AeroFusion AI</h2>
        <div class="subtitle">
            Flight Operations Center
        </div>

        <form method="POST">

            {% if error %}
            <div class="login-error">
                {{ error }}
            </div>
            {% endif %}

            <input
                type="text"
                name="simbrief_id"
                placeholder="請輸入 SimBrief Username"
                required
            >

            <button type="submit">
                Connect SimBrief
            </button>

        </form>

        <div class="hint">
            Import flight plans directly from SimBrief
        </div>

    </div>
</body>
</html>
