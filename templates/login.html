<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SkyWalker 飛行戰情室登入</title>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
        }
        .login-box { 
            background: #2c3e50; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.3); 
            width: 320px; 
            text-align: center; 
        }
        h2 { margin-bottom: 25px; color: #ecf0f1; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 6px; 
            border: none; 
            box-sizing: border-box; 
            background: #34495e;
            color: white;
            font-size: 14px;
        }
        input::placeholder { color: #bdc3c7; }
        button { 
            width: 100%; 
            padding: 12px; 
            margin-top: 10px; 
            background: #e67e22; 
            border: none; 
            border-radius: 6px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.3s;
        }
        button:hover { background: #d35400; }
        .hint { font-size: 12px; color: #95a5a6; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>SkyWalker 系統</h2>
        <form method="POST">
            <input type="text" name="simbrief_id" placeholder="請輸入 SimBrief Username" required>
            <button type="submit">登入 / 初始化副駕</button>
        </form>
        <div class="hint">系統將自動綁定您的航路數據</div>
    </div>
</body>
</html>
